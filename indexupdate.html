<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValidateHQ — Startup Idea Evaluator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface-2: #F0EDE6;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1A1916;
  --text-muted: #6B6860;
  --text-faint: #A09E99;
  --accent: #1A1916;
  --accent-hover: #3A3830;
  --green: #1D9E75;
  --amber: #BA7517;
  --red: #A32D2D;
  --score-high: #1D9E75;
  --score-mid: #BA7517;
  --score-low: #A32D2D;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SITE HEADER ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  background: rgba(247,245,240,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.site-header-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.site-header-logo img { height: 42px; width: auto; display: block; }
.logo-fallback {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem; letter-spacing: -0.01em; color: var(--text);
  display: flex; align-items: center; gap: 7px;
}
.logo-dot { width: 6px; height: 6px; background: var(--text); border-radius: 50%; display: inline-block; }
.site-nav { display: flex; align-items: center; gap: 0.25rem; }
.nav-link {
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  text-decoration: none; padding: 6px 14px;
  border-radius: 8px; border: 1px solid transparent;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.nav-link:hover { color: var(--text); border-color: var(--border); background: var(--surface); }
.nav-link.primary { background: var(--text); color: #fff; border-color: var(--text); }
.nav-link.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 100px 2rem 5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-bg-grid { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
#grid-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

.hero-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 1.25rem;
  opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards;
}
.hero-heading {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.2rem, 5.5vw, 3.6rem);
  line-height: 1.1; letter-spacing: -0.025em; max-width: 680px;
  margin-bottom: 1.25rem;
  opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards;
}
.hero-heading em { font-style: italic; color: var(--text-muted); }
.hero-sub {
  font-size: 16px; color: var(--text-muted); line-height: 1.7;
  max-width: 500px; margin: 0 auto 2.5rem;
  opacity: 0; animation: fadeUp 0.7s 0.35s ease forwards;
}

/* ── INPUT CARD ── */
.input-card {
  width: 100%; max-width: 560px; margin: 0 auto;
  opacity: 0; animation: fadeUp 0.7s 0.5s ease forwards;
  position: relative; z-index: 1;
}
.input-wrapper {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 18px;
  padding: 1.5rem;
  margin-bottom: 0.75rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s;
}
.input-wrapper:focus-within {
  box-shadow: 0 12px 48px rgba(0,0,0,0.1);
  border-color: rgba(0,0,0,0.22);
}
textarea {
  width: 100%; border: none; outline: none;
  font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--text);
  background: transparent; resize: none; line-height: 1.65; min-height: 110px;
}
textarea::placeholder { color: var(--text-faint); }
.input-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
}
.char-count { font-size: 12px; color: var(--text-faint); font-family: 'DM Mono', monospace; }
.cta-btn {
  background: var(--text); color: #fff; border: none;
  border-radius: 10px; padding: 10px 22px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: background 0.15s, transform 0.1s;
}
.cta-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.cta-btn:active { transform: scale(0.98); }
.cta-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.hint-pills {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  opacity: 0; animation: fadeUp 0.7s 0.65s ease forwards;
}
.hint-pill {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 12px; font-size: 12px; color: var(--text-muted);
  cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.hint-pill:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-2); }

.error-box {
  background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px;
  padding: 0.85rem 1.1rem; font-size: 13.5px; color: #A32D2D;
  margin-top: 0.75rem; text-align: left;
}

/* ── LOADING ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem; text-align: center;
}
.loading-orb {
  width: 52px; height: 52px;
  border: 2px solid var(--border); border-top-color: var(--text);
  border-radius: 50%; margin: 0 auto 2rem;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem;
}
.loading-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

/* ── REPORT ── */
.report {
  max-width: 700px; margin: 0 auto;
  padding: 80px 2rem 5rem;
}

.report-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem;
}
.back-btn {
  background: none; border: 1px solid var(--border); border-radius: 9px;
  padding: 7px 14px; font-family: 'Outfit', sans-serif; font-size: 13px;
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color: var(--border-strong); color: var(--text); }
.print-btn {
  background: var(--text); color: #fff; border: none; border-radius: 9px;
  padding: 7px 15px; font-family: 'Outfit', sans-serif; font-size: 13px;
  font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
}
.print-btn:hover { background: var(--accent-hover); }

/* Score hero card */
.score-hero {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 20px; padding: 1.75rem;
  margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 1.5rem;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
  animation: fadeUp 0.5s ease both;
}
.score-ring-wrap {
  flex-shrink: 0; position: relative; width: 88px; height: 88px;
}
.score-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--surface-2); stroke-width: 6; }
.ring-fill {
  fill: none; stroke-width: 6; stroke-linecap: round;
  stroke-dasharray: 245;
  stroke-dashoffset: 245;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.23,1,0.32,1), stroke 0.4s;
}
.score-ring-inner {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-ring-num {
  font-family: 'DM Serif Display', serif;
  font-size: 1.85rem; line-height: 1;
}
.score-ring-denom { font-size: 9px; opacity: 0.5; margin-top: 2px; font-family: 'DM Mono', monospace; }

.score-meta { flex: 1; min-width: 0; }
.score-grade-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 7px;
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
  color: #fff; margin-bottom: 0.5rem;
}
.score-verdict {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem; line-height: 1.4; margin-bottom: 0.4rem;
}
.score-summary { font-size: 13px; color: var(--text-muted); line-height: 1.55; }

/* Sections */
.section { margin-bottom: 1.25rem; animation: fadeUp 0.5s ease both; }
.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.1s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.2s; }

.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 0.75rem; padding-left: 2px;
}

/* Rubric grid */
.rubric-grid {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.rubric-row {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border);
}
.rubric-row:last-child { border-bottom: none; }
.rubric-label { flex: 1; font-size: 13.5px; font-weight: 500; }
.rubric-bar-wrap { flex: 2; height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
.rubric-bar {
  height: 100%; border-radius: 3px;
  width: 0; transition: width 1s cubic-bezier(0.23,1,0.32,1);
}
.rubric-score {
  width: 28px; text-align: right;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
}

/* Insights */
.insights-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
@media (max-width: 560px) { .insights-grid { grid-template-columns: 1fr; } }
.insight-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  transition: box-shadow 0.2s, transform 0.2s;
}
.insight-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.07); transform: translateY(-2px); }
.insight-card-header {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 0.75rem; display: flex; align-items: center; gap: 5px;
}
.insight-dot { width: 5px; height: 5px; border-radius: 50%; }
.dot-green { background: var(--green); }
.dot-red   { background: var(--red); }
.dot-amber { background: var(--amber); }
.insight-list { list-style: none; }
.insight-list li {
  font-size: 12.5px; color: var(--text-muted); line-height: 1.55;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.insight-list li.visible { opacity: 1; transform: none; }
.insight-list li:last-child { border-bottom: none; }

/* Validation steps */
.steps-card {
  background: var(--text); border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.step-row {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 1.1rem 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.08);
  opacity: 0; transform: translateX(-16px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.step-row.visible { opacity: 1; transform: none; }
.step-row:last-child { border-bottom: none; }
.step-num {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.45);
  font-family: 'DM Mono', monospace; margin-top: 1px;
}
.step-text { font-size: 13.5px; line-height: 1.55; color: rgba(255,255,255,0.6); padding-top: 2px; }

/* ── FOOTER ── */
.site-footer {
  border-top: 1px solid var(--border); padding: 1.75rem 2rem; text-align: center;
}
.footer-credit { font-size: 12.5px; color: var(--text-faint); margin-bottom: 0.5rem; }
.footer-link {
  font-size: 11.5px; color: var(--text-faint); text-decoration: none;
  border-bottom: 1px solid var(--border); padding-bottom: 1px;
  transition: color 0.15s, border-color 0.15s;
}
.footer-link:hover { color: var(--text-muted); border-color: var(--text-faint); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: none; }
}

@media print {
  .report-header, .site-header, .site-footer { display: none !important; }
  body { background: #fff; }
  .steps-card { background: #1a1916 !important; -webkit-print-color-adjust: exact; }
}
</style>

<body>

<!-- HEADER -->
<header class="site-header">
  <a href="/" class="site-header-logo">
    <img src="logo.png" alt="ValidateHQ" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <span class="logo-fallback" style="display:none;">
      <span class="logo-dot"></span>ValidateHQ
    </span>
  </a>
  <nav class="site-nav">
    <a href="/learn-more.html" class="nav-link">Learn More</a>
  </nav>
</header>

<div id="app"></div>

<footer class="site-footer">
  <p class="footer-credit">Made with ❤ by Amin Rabhi</p>
  <a href="/privacy-policy" class="footer-link">Privacy Policy</a>
</footer>

<script>
const HINTS = [
  "An AI tutor for adult learners returning to education",
  "A subscription box for rare, single-origin spices",
  "Peer-to-peer tool rental marketplace in local neighborhoods",
  "Mental health check-ins via voice notes with AI insights",
  "Freelance marketplace focused exclusively on climate projects",
];

const RUBRIC_LABELS = {
  market_demand: "Market demand",
  competition: "Competition",
  revenue_potential: "Revenue potential",
  technical_feasibility: "Technical feasibility",
  go_to_market_difficulty: "Go-to-market difficulty"
};

function scoreColor(n) {
  if (n >= 65) return "var(--green)";
  if (n >= 40) return "var(--amber)";
  return "var(--red)";
}
function barColor(key, val) {
  if (key === "competition" || key === "go_to_market_difficulty") {
    return val <= 4 ? "#1D9E75" : val <= 6 ? "#BA7517" : "#A32D2D";
  }
  return val >= 7 ? "#1D9E75" : val >= 4 ? "#BA7517" : "#A32D2D";
}
function letterGrade(s) {
  if (s >= 80) return "A";
  if (s >= 65) return "B";
  if (s >= 50) return "C";
  if (s >= 35) return "D";
  return "F";
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function calcScore(scores) {
  const positive = (scores.market_demand + scores.revenue_potential + scores.technical_feasibility) / 3;
  const penalty  = (scores.competition + scores.go_to_market_difficulty) / 2;
  return clamp(Math.round(positive * 7 + (10 - penalty) * 3), 0, 100);
}

let state = { view: "input", idea: "", loading: false, result: null, error: null };

function render() {
  const app = document.getElementById("app");
  if (state.view === "input")   app.innerHTML = renderInput();
  else if (state.view === "loading") app.innerHTML = renderLoading();
  else if (state.view === "report")  app.innerHTML = renderReport();
  bindEvents();
  if (state.view === "report") afterReportRender();
}

// ── WARP GRID (shared with learn-more) ──────────────────────────────
function initGrid(canvasId, heroEl) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const CELL = 42, WARP_RADIUS = 220, WARP_STRENGTH = 28, FADE_EASE = 0.08;
  let W, H, cols, rows;
  let mouse = { x: -9999, y: -9999 };
  let targetMouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width = heroEl.offsetWidth;
    H = canvas.height = heroEl.offsetHeight;
    cols = Math.ceil(W / CELL) + 2;
    rows = Math.ceil(H / CELL) + 2;
  }
  window.addEventListener('resize', resize);
  resize();

  heroEl.addEventListener('mousemove', e => {
    const rect = heroEl.getBoundingClientRect();
    targetMouse.x = e.clientX - rect.left;
    targetMouse.y = e.clientY - rect.top;
  });
  heroEl.addEventListener('mouseleave', () => { targetMouse.x = -9999; targetMouse.y = -9999; });

  function warpPoint(px, py) {
    const dx = px - mouse.x, dy = py - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist === 0 || dist > WARP_RADIUS) return { x: px, y: py };
    const falloff = 1 - dist / WARP_RADIUS;
    const ease = falloff * falloff * falloff;
    const angle = Math.atan2(dy, dx);
    const push = ease * WARP_STRENGTH;
    return { x: px - Math.cos(angle)*push, y: py - Math.sin(angle)*push };
  }

  function draw() {
    mouse.x += (targetMouse.x - mouse.x) * FADE_EASE;
    mouse.y += (targetMouse.y - mouse.y) * FADE_EASE;
    ctx.clearRect(0, 0, W, H);
    const offX = (W % CELL) / 2, offY = (H % CELL) / 2;
    ctx.strokeStyle = 'rgba(26,25,22,0.22)';
    ctx.lineWidth = 1.5;
    for (let c = -1; c <= cols; c++) {
      const baseX = offX + c * CELL;
      ctx.beginPath(); let started = false;
      for (let r = -1; r <= rows+1; r++) {
        const baseY = offY + r * CELL;
        const p = warpPoint(baseX, baseY);
        const edgeFade = Math.min(baseX/80,(W-baseX)/80,baseY/80,(H-baseY)/80,1);
        if (edgeFade <= 0) { started = false; continue; }
        ctx.globalAlpha = Math.min(edgeFade, 0.65);
        if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    for (let r = -1; r <= rows; r++) {
      const baseY = offY + r * CELL;
      ctx.beginPath(); let started = false;
      for (let c = -1; c <= cols+1; c++) {
        const baseX = offX + c * CELL;
        const p = warpPoint(baseX, baseY);
        const edgeFade = Math.min(baseX/80,(W-baseX)/80,baseY/80,(H-baseY)/80,1);
        if (edgeFade <= 0) { started = false; continue; }
        ctx.globalAlpha = Math.min(edgeFade, 0.65);
        if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
}

function renderInput() {
  const len = state.idea.length;
  return `
  <section class="hero" id="hero-section">
    <div class="hero-bg-grid"><canvas id="grid-canvas"></canvas></div>

    <div class="hero-label">Startup Idea Evaluator</div>
    <h1 class="hero-heading">Is your idea<br><em>worth pursuing?</em></h1>
    <p class="hero-sub">Paste your startup concept below. Our AI scores it across five dimensions and returns a structured analyst report — instantly.</p>

    <div class="input-card">
      <div class="input-wrapper">
        <textarea id="idea-input" placeholder="Describe your startup idea in a sentence or two. The more specific, the better." maxlength="1200">${escHtml(state.idea)}</textarea>
        <div class="input-footer">
          <span class="char-count" id="cc">${len} / 1200</span>
          <button class="cta-btn" id="analyze-btn" ${len < 10 ? "disabled" : ""}>Analyze idea →</button>
        </div>
      </div>
      ${state.error ? `<div class="error-box">${escHtml(state.error)}</div>` : ""}
    </div>

    <div class="hint-pills" style="max-width:560px;">
      ${HINTS.map((h,i) => `<button class="hint-pill" data-hint="${i}">Try: "${h.slice(0,42)}…"</button>`).join("")}
    </div>
  </section>`;
}

function renderLoading() {
  return `
  <div class="loading-state">
    <div class="loading-orb"></div>
    <div class="loading-label">Evaluating your idea…</div>
    <p class="loading-sub">Running rubric analysis across five dimensions.<br>This takes about 10–20 seconds.</p>
  </div>`;
}

function renderReport() {
  const r = state.result;
  const overall = r.overall_score ?? calcScore(r.scores);
  const grade = letterGrade(overall);
  const color = scoreColor(overall);
  const sk = Object.keys(RUBRIC_LABELS);
  // SVG ring: circumference of r=40 circle = ~251
  const circumference = 251;
  const offset = circumference - (overall / 100) * circumference;

  return `
  <div class="report">
    <div class="report-header">
      <button class="back-btn" id="back-btn">← New idea</button>
      <button class="print-btn" onclick="window.print()">↓ Export PDF</button>
    </div>

    <div class="section">
      <div class="score-hero">
        <div class="score-ring-wrap">
          <svg viewBox="0 0 88 88" width="88" height="88">
            <circle class="ring-track" cx="44" cy="44" r="40"/>
            <circle class="ring-fill" id="ring-fill-el" cx="44" cy="44" r="40"
              stroke="${color}" style="stroke-dashoffset:${circumference};"/>
          </svg>
          <div class="score-ring-inner">
            <span class="score-ring-num" style="color:${color}">${overall}</span>
            <span class="score-ring-denom">/ 100</span>
          </div>
        </div>
        <div class="score-meta">
          <div class="score-grade-badge" style="background:${color}">${grade}</div>
          <div class="score-verdict">${escHtml(r.verdict)}</div>
          <div class="score-summary">${escHtml(r.idea_summary)}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Rubric Breakdown</div>
      <div class="rubric-grid">
        ${sk.map(key => {
          const val = r.scores[key] ?? 0;
          const bc = barColor(key, val);
          return `
          <div class="rubric-row">
            <span class="rubric-label">${RUBRIC_LABELS[key]}</span>
            <div class="rubric-bar-wrap">
              <div class="rubric-bar" data-width="${val * 10}" style="background:${bc};"></div>
            </div>
            <span class="rubric-score" style="color:${bc}">${val}</span>
          </div>`;
        }).join("")}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Insights</div>
      <div class="insights-grid">
        <div class="insight-card">
          <div class="insight-card-header" style="color:var(--green)"><span class="insight-dot dot-green"></span>Strengths</div>
          <ul class="insight-list">${(r.strengths||[]).map(s=>`<li>${escHtml(s)}</li>`).join("")}</ul>
        </div>
        <div class="insight-card">
          <div class="insight-card-header" style="color:var(--red)"><span class="insight-dot dot-red"></span>Risks</div>
          <ul class="insight-list">${(r.risks||[]).map(s=>`<li>${escHtml(s)}</li>`).join("")}</ul>
        </div>
        <div class="insight-card">
          <div class="insight-card-header" style="color:var(--amber)"><span class="insight-dot dot-amber"></span>Opportunities</div>
          <ul class="insight-list">${(r.opportunities||[]).map(s=>`<li>${escHtml(s)}</li>`).join("")}</ul>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Validation Action Plan</div>
      <div class="steps-card">
        ${(r.validation_steps||[]).map((s,i)=>`
        <div class="step-row" style="transition-delay:${i*0.1}s">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${escHtml(s)}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function afterReportRender() {
  // Animate ring
  requestAnimationFrame(() => {
    const ring = document.getElementById('ring-fill-el');
    if (ring) {
      const r = state.result;
      const overall = r.overall_score ?? calcScore(r.scores);
      const circumference = 251;
      const offset = circumference - (overall / 100) * circumference;
      setTimeout(() => { ring.style.strokeDashoffset = offset; }, 80);
    }

    // Animate rubric bars
    document.querySelectorAll('.rubric-bar').forEach((bar, i) => {
      const w = bar.dataset.width;
      setTimeout(() => { bar.style.width = w + '%'; }, 100 + i * 80);
    });

    // Animate insight list items
    document.querySelectorAll('.insight-list li').forEach((li, i) => {
      setTimeout(() => li.classList.add('visible'), 300 + i * 60);
    });

    // Animate step rows
    document.querySelectorAll('.step-row').forEach((row, i) => {
      setTimeout(() => row.classList.add('visible'), 400 + i * 100);
    });
  });
}

function escHtml(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function bindEvents() {
  const hero = document.getElementById('hero-section');
  if (hero) initGrid('grid-canvas', hero);

  const ta = document.getElementById("idea-input");
  if (ta) {
    ta.addEventListener("input", () => {
      state.idea = ta.value;
      const cc = document.getElementById("cc");
      if (cc) cc.textContent = ta.value.length + " / 1200";
      const btn = document.getElementById("analyze-btn");
      if (btn) btn.disabled = ta.value.trim().length < 10;
    });
  }

  const analyze = document.getElementById("analyze-btn");
  if (analyze) {
    analyze.addEventListener("click", () => {
      const idea = state.idea.trim();
      if (idea.length < 10) return;
      runEval(idea);
    });
  }

  document.querySelectorAll(".hint-pill").forEach(p => {
    p.addEventListener("click", () => {
      state.idea = HINTS[parseInt(p.dataset.hint)];
      state.error = null;
      render();
    });
  });

  const back = document.getElementById("back-btn");
  if (back) back.addEventListener("click", () => {
    state.view = "input"; state.result = null; state.error = null; render();
  });
}

async function runEval(idea) {
  state.view = "loading"; state.error = null;
  render();
  try {
    const response = await fetch("/api/evaluate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idea })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || `API error ${response.status}`);
    data.overall_score = clamp(calcScore(data.scores), 0, 100);
    state.result = data;
    state.view = "report";
    render();
  } catch(err) {
    state.view = "input";
    state.error = "Evaluation failed: " + (err.message || "Unexpected response. Please try again.");
    render();
  }
}

render();
</script>
</body>
</html>
